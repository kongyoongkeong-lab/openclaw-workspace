name: Markdown Lint

on:
  push:
    branches: [master, develop]
    paths:
      - '*.md'
      - '**/*.md'
  pull_request:
    branches: [master]
    paths:
      - '*.md'
      - '**/*.md'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            *.md
            !.github/**
