name: Secret Scanner

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets (truffleHog)
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified --results=verified,unknown

      - name: Check for common key patterns
        run: |
          echo "Checking for potential secrets in tracked files..."
          ! grep -rnE '(ghp_|gho_|ghu_|ghs_|ghr_|comfyui-[a-f0-9]{32,}|sk-[a-zA-Z0-9]{20,}|api_key_comfy_org)' \
            --include='*.md' --include='*.py' --include='*.json' --include='*.yaml' --include='*.yml' \
            --exclude-dir=.git . 2>/dev/null
          echo "✅ No obvious secrets found"
