name: Secret Scanner

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tracked filenames
        run: |
          set -euo pipefail
          forbidden='(^|/)(\.env|\.env\..*|.*\.pem|.*\.key|.*\.p12|.*\.pfx|tokens?\.json|secrets?\.json|credentials?\.json|hosts\.yml)$'
          if git ls-files | grep -E "$forbidden"; then
            echo "Forbidden secret-like tracked filename detected"
            exit 1
          fi

      - name: Check tracked file contents
        run: |
          set -euo pipefail
          pattern='(gh[pousr]_[A-Za-z0-9_]{20,}|sk-[A-Za-z0-9]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|AIza[0-9A-Za-z_-]{25,}|TAVILY_API_KEY[[:space:]]*=|api_key_comfy_org|comfyui-[a-f0-9]{32,})'
          if git grep -nIE "$pattern" -- \
            '*.md' '*.py' '*.json' '*.yaml' '*.yml' '*.toml' '*.ini' '*.env' \
            ':!reports/**' ':!news/**' ':!vendor/**' ':!skills/**' \
            ':!.github/workflows/secret-scan.yml'; then
            echo "Potential secret pattern found in tracked files"
            exit 1
          fi
          status=$?
          if [ "$status" -eq 1 ]; then
            echo "No obvious secret patterns found"
            exit 0
          fi
          exit "$status"
