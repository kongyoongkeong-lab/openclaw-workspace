name: Webhook Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Webhook ping
        run: |
          echo "📡 Webhook trigger: ${{ github.event_name }}"
          echo "   Repo: ${{ github.repository }}"
          echo "   Ref: ${{ github.ref }}"
          echo "   SHA: ${{ github.sha }}"
      - name: Check for secrets
        run: |
          ! grep -rnE '(ghp_|gho_|sk-|comfyui-[a-f0-9]{32,})' . --include='*.md' --include='*.py' --include='*.json' --include='*.yaml' 2>/dev/null
          echo "✅ No secrets in push"
